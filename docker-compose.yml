services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: most-transparencia-bot:local
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      MAX_CONCURRENT_CONSULTAS: "6"
      BROWSER_CHANNEL: "chromium"
      ALLOW_HEADFUL_BROWSER: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
